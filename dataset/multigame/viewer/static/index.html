<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MultiGame Dataset Viewer</title>
  <style>
    body {
      margin: 0;
      background: #14161a;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    select, input, button {
      background: #1f2937;
      color: #f9fafb;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
    }
    button { cursor: pointer; }
    button:hover { background: #374151; }

    /* ── 렌더링 모드 탭 ── */
    .mode-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .mode-tab {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #374151;
      background: #1f2937;
      color: #9ca3af;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s, color 0.15s;
    }
    .mode-tab.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }
    .mode-tab:hover:not(.active) { background: #374151; color: #e5e7eb; }

    #meta {
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 8px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    #view-row {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    #canvas-wrap {
      border: 1px solid #334155;
      background: #0f172a;
      display: inline-block;
      border-radius: 10px;
      padding: 10px;
      flex-shrink: 0;
    }
    /* ── 범례 패널 ── */
    #legend {
      min-width: 180px;
      font-size: 13px;
    }
    #legend h4 { margin: 0 0 8px; color: #93c5fd; font-size: 13px; }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .legend-swatch {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .legend-label { color: #e5e7eb; }
    .legend-id { color: #6b7280; font-size: 11px; margin-left: auto; }

    /* ── 타일 맵핑 패널 ── */
    #mapping-panel {
      min-width: 280px;
      max-width: 400px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 12px;
      font-size: 12px;
    }
    #mapping-panel h4 {
      margin: 0 0 10px;
      color: #93c5fd;
      font-size: 13px;
    }
    .mapping-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      padding: 4px 6px;
      background: #0f172a;
      border-radius: 6px;
    }
    .mapping-src, .mapping-dst {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .mapping-arrow {
      color: #6b7280;
      font-size: 14px;
    }
    .mapping-label {
      flex: 1;
      color: #e5e7eb;
    }
    .mapping-id {
      color: #6b7280;
      font-size: 10px;
    }

    #error {
      color: #fda4af;
      min-height: 1.2em;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .hint {
      color: #93c5fd;
      font-size: 12px;
      margin-top: 8px;
    }

    /* ── 앨범 뷰 그리드 ── */
    #album-wrap {
      margin-top: 12px;
    }
    #album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
    }
    .album-item {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 4px;
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
      transition: transform 0.15s;
      overflow: hidden;
    }
    .album-item:hover {
      transform: translateY(-2px);
      background: #374151;
    }
    .album-canvas-wrap {
      flex: 1;
      min-height: 0;
      background: #0f172a;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 3px;
    }
    .album-canvas {
      image-rendering: pixelated;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .album-label {
      color: #e5e7eb;
      font-size: 10px;
      margin: 4px 0 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>MultiGame Dataset Viewer</h2>

    <!-- 게임 선택 + 이동 -->
    <div class="row">
      <label for="gameSelect">게임</label>
      <select id="gameSelect"></select>
      <button id="prevBtn">Prev (←)</button>
      <button id="nextBtn">Next (→)</button>
      <label for="indexInput">Index</label>
      <input id="indexInput" type="number" min="0" step="1" value="0" />
      <button id="goBtn">Go</button>
      <label for="viewModeSelect">보기</label>
      <select id="viewModeSelect">
        <option value="single">Single</option>
        <option value="album" selected>Album</option>
      </select>
      <label for="albumSizeSelect">앨범크기</label>
      <select id="albumSizeSelect">
        <option value="auto" selected>Auto</option>
        <option value="30">30</option>
        <option value="60">60</option>
      </select>
      <button id="reloadBtn" title="데이터셋 + tile_mapping.json 재로드 (서버 재시작 불필요)">⟳ Reload</button>
      <span id="reloadStatus" style="font-size:12px; color:#6b7280;"></span>
    </div>

    <!-- 렌더링 모드 탭 -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="raw-color">🎨 Raw Color</button>
      <button class="mode-tab" data-mode="raw-image">🧩 Raw Image</button>
      <button class="mode-tab" data-mode="unified-color">🌈 Unified Color</button>
      <button class="mode-tab" data-mode="unified-image">🖼 Unified Image</button>
    </div>

    <div id="meta"></div>
    <div id="error"></div>

    <div id="view-row">
      <div id="canvas-wrap">
        <canvas id="levelCanvas" width="384" height="384"></canvas>
      </div>
      <div id="legend"></div>
      <div id="mapping-panel" style="display:none;">
        <h4>🔀 타일 맵핑 (원본 → Unified)</h4>
        <div id="mapping-content"></div>
      </div>
    </div>

    <div id="album-wrap" style="display:none;">
      <div id="album-grid"></div>
    </div>

    <div class="hint">키보드: ← / → 이동, Album은 Auto면 브라우저 크기에 맞춰 개수 자동 조절</div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
