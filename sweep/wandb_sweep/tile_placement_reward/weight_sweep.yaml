program: train_cpcgrl.py
method: grid
metric:
  goal: maximize
  name: Train/ep_return
parameters:
  placement_w_amount:
    values: [0.8, 1.0, 1.2]
  placement_w_spread:
    values: [0.0, 0.3, 0.6]
  special_tile_penalty_weight:
    values: [0.0, 0.3, 0.6]
  game:
    value: 'dg'
  dataset_reward_enum:
    value: 2
  n_envs:
    values: [600]
  overwrite:
    value: true
  random_exp_name:
    value: true
  total_timesteps:
    value: 30000000


command:
  - ${interpreter}
  - ${program}
  - ${args_no_hyphens}
  - "overwrite=true"