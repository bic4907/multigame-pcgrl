program: train_cpcgrl.py
method: grid
metric:
  goal: maximize
  name: Train/ep_return
parameters:
  special_tile_penalty_weight:
    values: [0.35, 0.4, 0.45, 0.5]
  game:
    value: 'dg'
  dataset_reward_enum:
    value: 3
  dataset_condition_filter:
    value: "enum_3_min_20_max_23"
  n_envs:
    values: [600]
  overwrite:
    value: true
  random_exp_name:
    value: true
  total_timesteps:
    value: 15000000


command:
  - ${interpreter}
  - ${program}
  - ${args_no_hyphens}
  - "overwrite=true"