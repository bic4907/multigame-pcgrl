name: dataset validation

"on":
  push:
    paths:
      - "dataset/**"
      - "envs/**"
      - "tests/**"
      - "conf/**"
      - "instruct_rl/**"
      - "encoder/**"
      - "models.py"
      - "train_clip.py"
      - "train_cpcgrl.py"
      - "train_ipcgrl.py"
      - "train_ipcgrl_encoder.py"
      - "train_vipcgrl.py"
      - "train_mgpcgrl.py"
      - ".github/workflows/multigame-cache-tests.yml"
  pull_request:
    paths:
      - "dataset/**"
      - "envs/**"
      - "tests/**"
      - "conf/**"
      - "instruct_rl/**"
      - "encoder/**"
      - "models.py"
      - "train_clip.py"
      - "train_cpcgrl.py"
      - "train_ipcgrl.py"
      - "train_ipcgrl_encoder.py"
      - "train_vipcgrl.py"
      - "train_mgpcgrl.py"
      - ".github/workflows/multigame-cache-tests.yml"
  workflow_dispatch:

jobs:
  dataset-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pillow pytest

      - name: Restore multigame cache
        uses: actions/cache@v4
        with:
          path: dataset/multigame/cache/artifacts
          key: multigame-cache-${{ runner.os }}-${{ hashFiles('dataset/multigame/**/*.py') }}
          restore-keys: |
            multigame-cache-${{ runner.os }}-

      - name: Run tests
        run: |
          python -m pytest \
            dataset/multigame/tests/test_base_normalization.py \
            dataset/multigame/tests/test_cache_utils.py \
            -q --override-ini="testpaths="

      - name: Run tile mapping / one-hot / render validation
        run: |
          python -m pytest \
            dataset/multigame/tests/test_tile_utils.py \
            -v --override-ini="testpaths=" \
            -k "TestMappedShape or TestMappedMinMax or TestMappedRender or TestEndToEnd"


  env-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install JAX dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "jax[cpu]==0.5.0" \
            "jaxlib==0.5.0" \
            flax \
            "optax==0.2.4" \
            "chex==0.1.87" \
            "distrax==0.1.1" \
            "gymnax==0.0.8" \
            numpy pillow pytest

      - name: Run env tile integrity tests
        run: |
          python -m pytest tests/test_tile_integrity.py -v

      - name: Run multigame RL environment tests
        run: |
          python -m pytest tests/test_multigame_rl.py -v

      - name: Run multigame render tests
        run: |
          python -m pytest tests/test_multigame_render.py -v

  cpcgrl-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "jax[cpu]==0.5.0" \
            "jaxlib==0.5.0" \
            flax \
            "optax==0.2.4" \
            "chex==0.1.87" \
            "distrax==0.1.1" \
            "gymnax==0.0.8" \
            hydra-core \
            orbax-checkpoint \
            tensorboardX \
            wandb \
            "transformers<5" \
            scikit-learn \
            imageio \
            numpy pillow pytest pandas
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run CPCGRL config & dataset tests
        run: |
          python -m pytest tests/test_cpcgrl_baseline.py -v \
            -k "TestCPCGRLConfig or TestCPCGRLDatasetLoading"

      - name: Run CPCGRL training E2E test
        run: |
          python -m pytest tests/test_cpcgrl_baseline.py -v \
            -k "TestCPCGRLTraining"


  ipcgrl-checkpoint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "jax[cpu]==0.4.35" \
            "jaxlib==0.4.35" \
            flax \
            "optax==0.2.4" \
            "chex==0.1.87" \
            "distrax==0.1.1" \
            "gymnax==0.0.8" \
            hydra-core \
            "orbax-checkpoint==0.6.4" \
            tensorboardX \
            wandb \
            "transformers<5" \
            scikit-learn \
            imageio \
            numpy pillow pytest pandas
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run IPCGRL checkpoint pipeline test
        env:
          WANDB_MODE: disabled
          JAX_PLATFORMS: cpu
        run: |
          python -m pytest tests/test_ipcgrl_checkpoint.py -v -s

