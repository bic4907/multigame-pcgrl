# Template: CPCGRL reward enum sweep
# 이 파일은 템플릿입니다. deploy.py가 sweep 섹션을 읽어
# config/<sweep_name>/ 폴더 아래에 개별 YAML을 자동 생성합니다.
#
# 사용법:
#   python deploy.py -c cpcgrl_reward_enum   # 폴더 이름만 쓰면 됨

name: cpcgrl-re{dataset_reward_enum}
pod:
  template_id: runpod-torch-v280
  gpu: NVIDIA GeForce RTX 5090
  gpu_count: 1
  network_volume_id: dx18rniw3p
  spot: false
options:
  timeout: true
  time_limit: 43200    # 12h safety limit
  terminate: true       # 학습 끝나면 pod 자동 종료
runtime:
  cmds:
  - source /workspace/venv/bin/activate
  - cd /workspace/multigame-pcgrl
  - python train_cpcgrl.py n_envs=600 dataset_reward_enum={dataset_reward_enum}
sweep:
  dataset_reward_enum: [1, 2, 3, 4, 5]

