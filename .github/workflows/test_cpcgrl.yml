name: CPCGRL Baseline Test

on:
  push:
    branches: [main, exp/baselines]
    paths:
      - "train_cpcgrl.py"
      - "conf/config.py"
      - "envs/**"
      - "evaluator/**"
      - "instruct_rl/**"
      - "dataset/**"
      - "tests/test_cpcgrl_baseline.py"
      - ".github/workflows/test_cpcgrl.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  cpcgrl-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run CPCGRL config tests
        run: |
          python -m pytest tests/test_cpcgrl_baseline.py::TestCPCGRLConfig -v -s

      - name: Run CPCGRL dataset loading tests
        run: |
          python -m pytest tests/test_cpcgrl_baseline.py::TestCPCGRLDatasetLoading -v -s

      - name: Run CPCGRL training + checkpoint tests
        run: |
          python -m pytest tests/test_cpcgrl_baseline.py::TestCPCGRLTraining -v -s --timeout=300

